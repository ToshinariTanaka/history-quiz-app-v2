<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6fb7" />
  <title>中学歴史一問一答•基礎レベル</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.cover-open {
      overflow: hidden;
    }

    .brand {
      margin: 0 0 8px;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #54708f;
    }

    .app-shell {
      transition: opacity 0.28s ease;
    }

    body.cover-open .app-shell {
      opacity: 0.35;
      pointer-events: none;
      user-select: none;
    }

    .cover-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(18px, env(safe-area-inset-top))
        18px
        max(18px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0) 38%),
        linear-gradient(180deg, #eaf2fb 0%, #dce9f8 100%);
    }

    .cover-screen.hidden {
      display: none;
    }

    .cover-card {
      width: min(100%, 560px);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(216, 222, 233, 0.95);
      border-radius: 28px;
      padding: clamp(24px, 5vw, 34px);
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .cover-school {
      margin: 0 0 10px;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: #58708d;
    }

    .cover-title {
      margin: 0;
      font-size: clamp(1.9rem, 6vw, 2.8rem);
      line-height: 1.28;
      color: #12385f;
    }

    .cover-image-wrap {
      margin: clamp(18px, 4vw, 26px) auto 18px;
      width: min(260px, 72vw);
    }

    .cover-image {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 12px 22px rgba(47, 111, 183, 0.14));
    }

    .cover-copy {
      margin: 0 0 20px;
      font-size: 1rem;
      line-height: 1.8;
      font-weight: 700;
      color: #475569;
    }

    .cover-start {
      min-height: 60px;
      font-size: 1.08rem;
      font-weight: 800;
    }

    .cover-note {
      margin: 14px 0 0;
      font-size: 0.92rem;
      line-height: 1.7;
      color: #64748b;
      font-weight: 700;
    }

    .main-subtitle {
      margin: 0 0 24px;
      font-size: clamp(1rem, 3.3vw, 1.15rem);
      line-height: 1.7;
      color: #475569;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      .cover-card {
        border-radius: 22px;
        padding: 22px 18px;
      }

      .cover-school {
        font-size: 0.88rem;
      }

      .cover-copy {
        font-size: 0.95rem;
      }

      .cover-start {
        min-height: 56px;
      }
    }
  </style>
</head>

          alt="ヘッドホンをつけた緑色の先生キャラクター"
        />
      </div>
      <p class="cover-copy">基礎事項をテンポよく確認できる、Up塾の歴史クイズです。</p>
      <button id="cover-start" class="cover-start" type="button">スタート</button>
      <p class="cover-note">スタート後に、出題数や出題モードを設定できます。</p>
    </section>
  </div>

  <main id="app-shell" class="container app-shell" aria-hidden="true">
    <p class="brand">個別指導Up塾</p>
    <h1>中学歴史一問一答•基礎レベル</h1>
    <p class="main-subtitle">正しい選択肢を1つ選んでください。</p>

    <section class="settings-card" aria-label="出題設定">
      <div class="settings-grid">
        <label class="setting-field" for="question-count">
          <span class="setting-label">出題数</span>
          <select id="question-count" class="setting-select" aria-label="出題数"></select>
        </label>

        <label class="setting-field" for="range-mode">
          <span class="setting-label">出題範囲</span>
          <select id="range-mode" class="setting-select" aria-label="出題範囲"></select>
        </label>

        <label class="setting-field" for="practice-mode">
          <span class="setting-label">出題モード</span>
          <select id="practice-mode" class="setting-select" aria-label="出題モード"></select>
        </label>

        <label class="setting-field" for="correct-sound">
          <span class="setting-label">正解音</span>
          <select id="correct-sound" class="setting-select" aria-label="正解音"></select>
        </label>

        <label class="setting-field" for="random-mode">
          <span class="setting-label">出題順</span>
          <span class="toggle-row">
            <input id="random-mode" type="checkbox" checked />
            <span>ランダムで出題する</span>
          </span>
        </label>

        <label id="start-era-field" class="setting-field hidden" for="start-era">
          <span class="setting-label">時代指定</span>
          <select id="start-era" class="setting-select" aria-label="時代指定"></select>
        </label>
      </div>

      <div id="study-record" class="study-record hidden"></div>

      <button id="apply-settings" type="button">この設定で開始</button>
    </section>

    <section class="quiz-card">
      <p id="mode" class="mode hidden" aria-live="polite"></p>
      <p id="era" class="era hidden" aria-live="polite"></p>
      <p id="question" aria-live="polite">問題を読み込み中…</p>
      <div id="choices" class="choices" role="list"></div>
      <p id="result" class="result hidden" aria-live="polite"></p>
      <div id="summary" class="summary hidden" aria-live="polite"></div>
      <div id="progress" class="progress" aria-live="polite"></div>
      <div class="actions">
        <button id="next" type="button" class="secondary hidden" disabled>次の問題へ</button>
        <button id="restart" type="button" class="secondary hidden">もう一度挑戦</button>
        <button id="review-missed" type="button" class="secondary hidden">❌だけ復習</button>
        <button id="change-settings" type="button" class="secondary hidden">設定を変える</button>
      </div>
    </section>
  </main>

  <script>
    const coverScreen = document.getElementById("cover-screen");
    const coverStartBtn = document.getElementById("cover-start");
    const appShell = document.getElementById("app-shell");

    function openApp() {
      document.body.classList.remove("cover-open");
      coverScreen.classList.add("hidden");
      appShell.setAttribute("aria-hidden", "false");
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    coverStartBtn.addEventListener("click", openApp);
  </script>
  <script src="script.js"></script>
  <script src="start-era-fix.js"></script>
  <script src="sound-settings.js"></script>
</body>
</html>
