<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6fb7" />
  <title>画像つき問題試作 - 遼東半島</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --card: #ffffff;
      --text: #1f2a37;
      --accent: #2f6fb7;
      --accent-dark: #1f5a99;
      --border: #d8dee9;
      --correct: #15803d;
      --incorrect: #b91c1c;
      --success-bg: #ecfdf3;
      --error-bg: #fef2f2;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: clamp(16px, 3vw, 24px);
    }

    h1 {
      margin: 8px 0 10px;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 22px;
      font-size: 1rem;
      line-height: 1.7;
      color: #475569;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: clamp(18px, 4vw, 28px);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 14px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--accent-dark);
      font-size: 0.95rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .question-image-wrap {
      margin-bottom: 18px;
    }

    .question-image {
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #ffffff;
      display: block;
    }

    .question {
      font-size: clamp(1.3rem, 4.6vw, 1.9rem);
      line-height: 1.7;
      margin: 0 0 22px;
      word-break: break-word;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    button {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      font: inherit;
      font-size: 1.08rem;
      line-height: 1.4;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      button:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
      }
    }

    button:disabled {
      opacity: 0.72;
      cursor: default;
      transform: none;
    }

    .correct {
      background: var(--correct) !important;
    }

    .incorrect {
      background: var(--incorrect) !important;
    }

    .result {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 1.03rem;
      font-weight: 700;
      line-height: 1.8;
    }

    .result.success {
      background: var(--success-bg);
      color: #166534;
    }

    .result.error {
      background: var(--error-bg);
      color: #991b1b;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .secondary {
      background: #e2e8f0;
      color: #334155;
    }

    .secondary:hover {
      background: #cbd5e1;
    }

    .note {
      margin-top: 18px;
      font-size: 0.96rem;
      line-height: 1.7;
      color: #64748b;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .choices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>画像つき問題 試作</h1>
    <p class="subtitle">今の一問一答アプリとは別ファイルです。画像1枚つき・1問だけの最小構成で動きを試します。</p>

    <section class="card">
      <div class="tag">地理 画像問題 試作</div>

      <div class="question-image-wrap">
        <img class="question-image" src="images/chiri/ryotou-demo-map.svg" alt="東アジアの簡略地図。AからDの候補が示されている。" />
      </div>

      <p class="question">遼東半島は地図上のA〜Dのどれか。</p>

      <div class="choices" id="choices">
        <button type="button" data-choice="A">A</button>
        <button type="button" data-choice="B">B</button>
        <button type="button" data-choice="C">C</button>
        <button type="button" data-choice="D">D</button>
      </div>

      <div id="result" aria-live="polite"></div>

      <div class="actions">
        <button type="button" class="secondary" id="restart">もう一度試す</button>
      </div>

      <p class="note">正解はAです。遼東半島は中国東北部、渤海と黄海にはさまれた半島です。</p>
    </section>
  </main>

  <script>
    const answer = "A";
    const choiceButtons = Array.from(document.querySelectorAll("#choices button"));
    const resultEl = document.getElementById("result");
    const restartBtn = document.getElementById("restart");

    function resetQuestion() {
      resultEl.textContent = "";
      resultEl.className = "";
      choiceButtons.forEach((button) => {
        button.disabled = false;
        button.classList.remove("correct", "incorrect");
      });
    }

    choiceButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const choice = button.dataset.choice;
        const isCorrect = choice === answer;

        choiceButtons.forEach((item) => {
          item.disabled = true;
          if (item.dataset.choice === answer) {
            item.classList.add("correct");
          } else if (item.dataset.choice === choice) {
            item.classList.add("incorrect");
          }
        });

        if (isCorrect) {
          resultEl.textContent = "正解です。遼東半島はAです。";
          resultEl.className = "result success";
        } else {
          resultEl.textContent = "不正解です。正解はAです。遼東半島は中国東北部の半島です。";
          resultEl.className = "result error";
        }
      });
    });

    restartBtn.addEventListener("click", resetQuestion);
  </script>
</body>
</html>
