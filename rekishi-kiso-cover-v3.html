<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6fb7" />
  <title>中学歴史一問一答•基礎レベル</title>
  <style>
    :root {
      --bg: #eef4fb;
      --card: rgba(255, 255, 255, 0.95);
      --text: #12385f;
      --sub: #5d718a;
      --accent: #2f6fb7;
      --border: #d8dee9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding:
        max(18px, env(safe-area-inset-top))
        18px
        max(18px, env(safe-area-inset-bottom));
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0) 38%),
        linear-gradient(180deg, var(--bg) 0%, #dde8f7 100%);
      color: var(--text);
    }

    .cover-card {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(22px, 5vw, 34px);
      box-shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    .cover-school {
      margin: 0 0 10px;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--sub);
    }

    .cover-title {
      margin: 0;
      font-size: clamp(2.5rem, 8.4vw, 4rem);
      line-height: 1.16;
      letter-spacing: 0.01em;
    }

    .cover-image {
      display: block;
      width: min(140px, 34vw);
      height: auto;
      margin: 20px auto 18px;
      border-radius: 50%;
      box-shadow: 0 12px 22px rgba(47, 111, 183, 0.14);
    }

    .cover-copy {
      margin: 0 0 18px;
      font-size: 1rem;
      line-height: 1.8;
      font-weight: 700;
      color: #475569;
    }

    .cover-start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 60px;
      padding: 16px 18px;
      border: none;
      border-radius: 16px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 1.08rem;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(47, 111, 183, 0.18);
    }

    .cover-note {
      margin: 14px 0 0;
      font-size: 0.92rem;
      line-height: 1.7;
      color: #64748b;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      .cover-card {
        border-radius: 22px;
        padding: 20px 18px;
      }

      .cover-title {
        font-size: clamp(2.2rem, 9vw, 3.3rem);
      }

      .cover-image {
        width: min(120px, 32vw);
      }
    }
  </style>
</head>
